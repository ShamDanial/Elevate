<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Rocket body -->
  <ellipse cx="256" cy="210" rx="65" ry="100" fill="none" stroke="#7C4FFF" stroke-width="14"/>

  <!-- Rocket tip -->
  <polygon points="256,90 191,190 321,190" fill="none" stroke="#7C4FFF" stroke-width="14" stroke-linejoin="round"/>

  <!-- Play button inside rocket -->
  <polygon points="235,185 235,235 285,210" fill="#7C4FFF"/>

  <!-- Left fin -->
  <polygon points="191,270 160,320 191,310" fill="none" stroke="#7C4FFF" stroke-width="12" stroke-linejoin="round"/>

  <!-- Right fin -->
  <polygon points="321,270 352,320 321,310" fill="none" stroke="#7C4FFF" stroke-width="12" stroke-linejoin="round"/>

  <!-- Rocket bottom -->
  <line x1="191" y1="310" x2="321" y2="310" stroke="#7C4FFF" stroke-width="14" stroke-linecap="round"/>

  <!-- Flame outer -->
  <ellipse cx="256" cy="350" rx="35" ry="45" fill="#5B3FCC" opacity="0.7"/>

  <!-- Flame inner -->
  <ellipse cx="256" cy="360" rx="20" ry="30" fill="#00C9A7" opacity="0.9"/>

  <!-- ELEVATE text -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-weight="900" font-size="55" fill="white" text-anchor="middle" letter-spacing="4">ELEVATE</text>

</svg>
